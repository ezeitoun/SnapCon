<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" role="img" aria-label="PLA Filament Spool">
  <defs>
    <linearGradient id="frame" x1="10" y1="6" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#333B4E"/>
      <stop offset="1" stop-color="#12151C"/>
    </linearGradient>
    <radialGradient id="hub" cx="0.35" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#3A4356"/>
      <stop offset="1" stop-color="#1A1F29"/>
    </radialGradient>
  </defs>

  <!-- outer flange -->
  <circle cx="30" cy="30" r="27" fill="url(#frame)"/>

  <!-- wound filament -->
  <path d="
      M30 6.5 A23.5 23.5 0 1 1 29.99 6.5 Z
      M30 16.5 A13.5 13.5 0 1 0 30.01 16.5 Z"
    fill="{HEX}" fill-rule="evenodd"/>

  <!-- spokes crossing center, sitting under the hub -->
  <g stroke="#161A22" stroke-width="4.5" stroke-linecap="butt">
    <line x1="30" y1="17" x2="30" y2="43" transform="rotate(0 30 30)"/>
    <line x1="30" y1="17" x2="30" y2="43" transform="rotate(60 30 30)"/>
    <line x1="30" y1="17" x2="30" y2="43" transform="rotate(120 30 30)"/>
  </g>

  <!-- inner hub -->
  <circle cx="30" cy="30" r="9" fill="url(#hub)"/>

  <!-- center hole -->
  <circle cx="30" cy="30" r="4" fill="#0B0D12"/>

  <!-- 3D highlight arc, upper-left -->
  <path d="M6.89 19.22 A25.5 25.5 0 0 1 29.11 4.52"
    fill="none" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="3" stroke-linecap="round"/>
</svg>
