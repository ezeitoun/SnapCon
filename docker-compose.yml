# SnapCon via Docker — for always-on hosts (Pi / NAS / homelab).
#
# Quick start:
#   cp config.example.json config.json      # a writable config the hub persists to
#   mkdir -p gcode                           # where your sliced .gcode lives
#   docker compose up -d
#   open http://<this-host-ip>:4545
#
# Auto-discovery scans your LAN, which only works with host networking (Linux
# hosts). On Docker Desktop (macOS/Windows) host networking behaves differently —
# use the "ports" block instead and just add printers by IP in Settings.

services:
  snapcon:
    # Build from this repo. (Once images are published you could instead use:
    #   image: ghcr.io/ezeitoun/snapcon:latest )
    build: .
    container_name: snapcon
    restart: unless-stopped

    # --- Linux hosts: host networking enables LAN auto-discovery ---
    network_mode: host

    # --- Docker Desktop (macOS/Windows): comment out network_mode above and
    #     uncomment this instead, then add printers by IP (discovery won't scan) ---
    # ports:
    #   - "4545:4545"

    volumes:
      - ./config.json:/app/config.json   # persists your printer list & settings
      - ./gcode:/app/gcode               # your Orca output folder
